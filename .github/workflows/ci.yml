name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  detect-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node.js 프로젝트 감지 (감지 메시지만 — 실제 실행은 아래 step 들)
      - name: Node.js 프로젝트 감지
        if: hashFiles('package.json') != ''
        run: |
          node_version=$(jq -r '.engines.node // "20"' package.json | grep -oE '[0-9]+' | head -1)
          echo "Node.js ${node_version} 사용"

      # Node.js 실 테스트 (#153)
      # - setup-node 는 package.json 존재 시 실행. node-version-file 이 engines.node 의 semver range 도 해석
      # - cache 는 package-lock.json 이 있을 때만 활성화 (setup-node v4 가 알아서 skip)
      # - npm ci 는 package-lock.json 이 있을 때만 (재현 가능한 정확한 설치)
      # - npm install --no-audit --no-fund 는 lock 이 없는 Node 프로젝트 fallback
      # - npm test --if-present 는 scripts.test 없으면 조용히 skip (다운스트림 호환성)
      # setup-node@v4 는 cache: 'npm' 이 설정돼도 package-lock.json 부재 시 자동으로
       # 캐시를 비활성화하므로 (warning 만 남기고 fail 아님) 분기 불필요 — 단일 step
      - name: Node.js setup
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      - name: npm ci (lockfile 있을 때)
        if: hashFiles('package-lock.json') != ''
        run: npm ci

      - name: npm install (lockfile 없을 때 fallback)
        if: hashFiles('package.json') != '' && hashFiles('package-lock.json') == ''
        run: npm install --no-audit --no-fund --ignore-scripts

      - name: npm test
        if: hashFiles('package.json') != ''
        run: npm test --if-present

      # Python 프로젝트 감지
      - name: Python 테스트
        if: hashFiles('pyproject.toml') != '' || hashFiles('setup.py') != ''
        run: |
          echo "Python 프로젝트 감지됨"
        # Python 설정은 프로젝트별로 추가

      # Go 프로젝트 감지
      - name: Go 테스트
        if: hashFiles('go.mod') != ''
        run: |
          echo "Go 프로젝트 감지됨"
        # Go 설정은 프로젝트별로 추가

      # Rust 프로젝트 감지
      - name: Rust 테스트
        if: hashFiles('Cargo.toml') != ''
        run: |
          echo "Rust 프로젝트 감지됨"
        # Rust 설정은 프로젝트별로 추가

      # Makefile 기반
      - name: Make 테스트
        if: hashFiles('Makefile') != ''
        run: |
          if grep -q "^test:" Makefile; then
            make test
          fi

      # agent SSoT drift 가드 (#145)
      # CLAUDE.md `### sub-agent 검증 완료 ≠ GitHub 박제 완료` 의 공통 JSON 스키마 7개 필드가
      # 5개 에이전트 파일의 `## 마무리 체크리스트 JSON 반환` 섹션에 모두 존재하고 선언 순서를
      # 유지하는지 검사. drift 시 exit 1 로 PR 머지 전 차단.
      - name: agent SSoT drift 가드
        if: hashFiles('scripts/verify-agent-ssot.sh') != ''
        run: bash scripts/verify-agent-ssot.sh
