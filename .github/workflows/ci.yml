name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  detect-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node.js 프로젝트 감지
      - name: Node.js 테스트
        if: hashFiles('package.json') != ''
        run: |
          node_version=$(jq -r '.engines.node // "20"' package.json | grep -oE '[0-9]+' | head -1)
          echo "Node.js ${node_version} 사용"
        # Node 설정은 프로젝트별로 추가

      # Python 프로젝트 감지
      - name: Python 테스트
        if: hashFiles('pyproject.toml') != '' || hashFiles('setup.py') != ''
        run: |
          echo "Python 프로젝트 감지됨"
        # Python 설정은 프로젝트별로 추가

      # Go 프로젝트 감지
      - name: Go 테스트
        if: hashFiles('go.mod') != ''
        run: |
          echo "Go 프로젝트 감지됨"
        # Go 설정은 프로젝트별로 추가

      # Rust 프로젝트 감지
      - name: Rust 테스트
        if: hashFiles('Cargo.toml') != ''
        run: |
          echo "Rust 프로젝트 감지됨"
        # Rust 설정은 프로젝트별로 추가

      # Makefile 기반
      - name: Make 테스트
        if: hashFiles('Makefile') != ''
        run: |
          if grep -q "^test:" Makefile; then
            make test
          fi

      # agent SSoT drift 가드 (#145)
      # CLAUDE.md `### sub-agent 검증 완료 ≠ GitHub 박제 완료` 의 공통 JSON 스키마 7개 필드가
      # 5개 에이전트 파일의 `## 마무리 체크리스트 JSON 반환` 섹션에 모두 존재하고 선언 순서를
      # 유지하는지 검사. drift 시 exit 1 로 PR 머지 전 차단.
      - name: agent SSoT drift 가드
        if: hashFiles('scripts/verify-agent-ssot.sh') != ''
        run: bash scripts/verify-agent-ssot.sh
